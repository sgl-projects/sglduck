name: Docs

on:
  push:
    branches: [main]
  pull_request:

# Read-only by default; the deploy job widens its own permissions.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The docs build imports the package (mkdocstrings, and markdown-exec runs
      # the SGL examples), so install it alongside the docs tools.
      - name: Install docs dependencies
        run: pip install ".[docs]"
      - name: Build docs
        run: mkdocs build --strict --site-dir site
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
