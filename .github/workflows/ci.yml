name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is a follow-up: the committed flex/parser sources need MSVC
        # portability work (unistd.h, asprintf).
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (compiles the _sgl extension)
        shell: bash
        run: pip install ".[test]"
      - name: Run tests
        # The lets-plot SVG snapshot tests are excluded: their baselines are
        # platform-specific (lets-plot renders differently per OS), so they are
        # a local visual-regression tool, not CI-enforced. Everything else —
        # the build and all platform-stable tests — runs here.
        shell: bash
        run: pytest -m "not snapshot"
